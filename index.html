<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
</head>
<body>
   <form>
      <input type="email" placeholder="Email">
      <br>
      <input type="password" placeholder="Password">
      <br>
      <input type="username" placeholder="GitHub Username">
      <br>
      <fieldset>
         <input id="Enterprise" type="radio" name="GitType" value="Enterprise">
         <label for="Enterprise">Enterprise</label>
         <br>
         <input id="Pro" type="radio" name="GitType" value="Pro">
         <label for="Pro">Pro</label>
         <br>
         <input id="Free" type="radio" name="GitType" value="Free">
         <label for="Free">Free</label>
         <br>
      </fieldset>
      <input id="Remember Me" type="checkbox" value="Remember Me">
      <label for="Remember Me">Remember Me</label>
   </form>
</body>
</html>
